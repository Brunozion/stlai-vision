services:
  - type: web
    name: stlai-vision-api
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter api build
    startCommand: corepack pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: N8N_BASE_URL
        value: https://n8n.stlflix.com
      - key: N8N_INTERNAL_TOKEN
        sync: false
      - key: N8N_ENABLED
        value: "true"
      - key: N8N_TEXT_WEBHOOK_PATH
        value: /webhook/vision-1-text
      - key: N8N_IMAGE_WEBHOOK_PATH
        value: /webhook/vision-1-image
      - key: OPENAI_API_KEY
        sync: false
      - key: DEV_USER_EMAIL
        value: osnegociosdobruno@gmail.com
      - key: DEV_USER_NAME
        value: Bruno Silva Macedo
